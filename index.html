<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barstool Yug Station - Retro 95</title>
<style>
body {
  font-family:'MS Sans Serif', Tahoma, Geneva, sans-serif;
  font-size:12px;
  background:#008080;
  color:black;
  margin:0;
  padding:20px;
}
* { box-sizing: border-box; }

/* Windows */
.window {
  background:#c0c0c0;
  border:2px solid #808080;
  position:absolute;
  box-shadow:2px 2px 0px #fff inset;
  cursor:default;
}
.window-header {
  background:#000080;
  color:white;
  font-weight:bold;
  padding:2px 5px;
  cursor:move;
  user-select:none;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.min-btn {
  background:#c0c0c0;
  border:2px outset #fff;
  width:18px;
  height:16px;
  font-size:10px;
  line-height:10px;
  cursor:pointer;
  padding:0;
}
.min-btn:active { border-style:inset; }
.window-body { padding:10px; }

/* Timer */
#timerWindow { width: 300px; }
#nameInput {
  width: 100%;
  padding: 4px;
  font-size: 12px;
  margin-top: 12px;
  box-sizing: border-box;
}
.timer-buttons { display:flex; gap:4px; margin-top:6px; }
.timer-buttons button { flex:1; padding:4px 0; font-size:12px; cursor:pointer; }

/* Timer bar */
#timerContainer {
  position:relative;
  width:100%;
  height:40px;
  background:#fff;
  border:2px solid #808080;
  overflow:hidden;
  border-radius:4px;
  margin-bottom:6px;
}
#timerFill {
  position:absolute;
  left:0; top:0;
  height:100%;
  width:0%;
  background: linear-gradient(to top, #f4d35e 0%, #ffd966 80%);
  z-index:0;
}
#timerText {
  position:relative;
  z-index:2;
  font-family:monospace;
  font-size:28px;
  font-weight:bold;
  text-align:center;
  line-height:40px;
}

/* Bubble foam */
.bubble {
  position:absolute;
  bottom:0;
  width:4px;
  height:4px;
  border-radius:50%;
  background:white;
  opacity:0.8;
  animation: rise 2s linear infinite;
  z-index:1;
}
@keyframes rise {
  0% { transform: translateY(0) scale(0.8); opacity:0.8; }
  50% { transform: translateY(-30px) scale(1); opacity:0.9; }
  100% { transform: translateY(-50px) scale(0.8); opacity:0; }
}

/* Leaderboard */
#leaderboardWindow { width:700px; top:50px; left:370px; }
#leaderboardWindow .window-body {
  padding:10px;
  max-height:600px;
  overflow-y:auto;
}
#leaderboard table {
  width:100%;
  border-collapse:collapse;
  font-family: monospace;
}
#leaderboard th, #leaderboard td {
  border:1px solid #808080;
  padding:4px 6px;
  font-size:12px;
}
#leaderboard th {
  background:#000080;
  color:white;
  font-weight:bold;
}
#leaderboard th:nth-child(1), #leaderboard td:nth-child(1) { text-align:center; width:50px; }
#leaderboard th:nth-child(2), #leaderboard td:nth-child(2) { text-align:left; padding-left:6px; width:200px; }
#leaderboard th:nth-child(3), #leaderboard td:nth-child(3),
#leaderboard th:nth-child(4), #leaderboard td:nth-child(4) { text-align:right; padding-right:4px; width:auto; }
#leaderboard th:nth-child(5), #leaderboard td:nth-child(5) { text-align:center; width:50px; }
.rank1 { color:red; font-weight:bold; }

/* Inputs fill cells with beer progress */
input.time-input {
  width:100%;
  box-sizing:border-box;
  text-align:right;
  border:1px solid #808080;
  padding:2px 4px;
  font-size:12px;
  background-size: 100% 100%;
}

/* Inputs fill cells */
input.date-input {
  width:100%;
  box-sizing:border-box;
  text-align:right;
  border:1px solid #808080;
  padding:2px 4px;
  font-size:12px;
}

/* That's Baseball */
#baseballWindow { width:200px; text-align:center; top:20px; right:20px; }
#baseballWindow .window-body { cursor:pointer; font-weight:bold; font-size:14px; color:#000080; }
#baseballWindow .window-body:hover { text-decoration:underline; }

/* Yug Stats Window */
#yugStatsWindow { width:200px; bottom:50px; right:20px; top:auto !important; }
#yugStatsWindow .window-body { font-weight:bold; position:relative; overflow:hidden; }
#yugStatsWindow #yugImage { position:relative; z-index:2; max-width:120px; height:auto; }

/* Start bar */
#startBar {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:30px;
  background:#c0c0c0;
  border-top:2px solid #fff;
  display:flex;
  align-items:center;
  padding-left:4px;
  box-sizing:border-box;
  font-weight:bold;
}
#startButton {
  width:60px;
  height:24px;
  background:#c0c0c0;
  border:2px outset #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:12px;
}
#startButton:active { border-style:inset; }
#startMenu {
  position:fixed;
  bottom:30px;
  left:0;
  width:200px;
  background:#c0c0c0;
  border:2px solid #808080;
  display:none;
  flex-direction:column;
  padding:4px;
}
.start-icon {
  background:#c0c0c0;
  border:2px outset #fff;
  padding:2px;
  margin:2px 0;
  cursor:pointer;
  text-align:center;
  font-size:12px;
}
.start-icon:active { border-style:inset; }
</style>
</head>
<body>

<!-- Timer Window -->
<div class="window" id="timerWindow" style="top:50px; left:50px;">
  <div class="window-header">
    <span>Timer</span>
    <button class="min-btn" onclick="minimizeWindow('timerWindow')">_</button>
  </div>
  <div class="window-body">
    <div id="timerContainer">
      <div id="timerFill"></div>
      <div id="timerText">0.00</div>
    </div>
    <input id="nameInput" type="text" placeholder="Enter name..." />
    <div class="timer-buttons">
      <button onclick="startTimer()">Start</button>
      <button onclick="stopTimer()">Stop</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>
</div>

<!-- Leaderboard Window -->
<div class="window" id="leaderboardWindow">
  <div class="window-header">
    <span>Leaderboard</span>
    <button class="min-btn" onclick="minimizeWindow('leaderboardWindow')">_</button>
  </div>
  <div class="window-body">
    <table id="leaderboard">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th>Time</th>
          <th>Date</th>
          <th>X</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- That's Baseball -->
<div class="window" id="baseballWindow">
  <div class="window-header">
    <span>That's Baseball</span>
    <button class="min-btn" onclick="minimizeWindow('baseballWindow')">_</button>
  </div>
  <div class="window-body" onclick="openRandomBaseballWiki()">⚾ Click me!</div>
</div>

<!-- Yug Stats Window -->
<div class="window" id="yugStatsWindow">
  <div class="window-header">
    <span>Yug Stats</span>
    <button class="min-btn" onclick="minimizeWindow('yugStatsWindow')">_</button>
  </div>
  <div class="window-body">
    <div>Total Yugs: <span id="totalYugs">0</span></div>
    <div>Total Yug Time: <span id="totalYugTime">0.00</span></div>
    <div style="margin-top:10px; position:relative; height:120px;">
      <img id="yugImage" src="https://raw.githubusercontent.com/goatchase/anus100k/main/Yug.jpg" alt="Yug" />
    </div>
  </div>
</div>

<audio id="airhorn" src="https://www.soundjay.com/misc/sounds/air-horn.mp3"></audio>

<div id="startBar">
  <div id="startButton">Start</div>
  <div id="startMenu"></div>
</div>

<script type="module">
// Firebase config omitted for brevity (keep your config here)
let zIndexCounter = 1000;
function bringToFront(win){ zIndexCounter++; win.style.zIndex = zIndexCounter; }

// --- Draggable ---
function makeDraggable(el){
  const header = el.querySelector('.window-header');
  let offsetX=0, offsetY=0, isDown=false;
  header.addEventListener('mousedown',e=>{
    isDown=true; offsetX=e.clientX-el.offsetLeft; offsetY=e.clientY-el.offsetTop;
    bringToFront(el);
  });
  document.addEventListener('mousemove',e=>{
    if(!isDown) return;
    el.style.left=(e.clientX-offsetX)+'px';
    el.style.top=(e.clientY-offsetY)+'px';
  });
  document.addEventListener('mouseup',()=>{ isDown=false; });
}
['timerWindow','leaderboardWindow','baseballWindow','yugStatsWindow'].forEach(id=>{
  makeDraggable(document.getElementById(id));
});

// --- Start Menu toggle ---
const startButton = document.getElementById('startButton');
const startMenu = document.getElementById('startMenu');
startButton.addEventListener('click',()=> startMenu.style.display = startMenu.style.display==='flex'?'none':'flex');

// --- Minimize Windows ---
const minimizedWindows = {};
function minimizeWindow(id){
  const win = document.getElementById(id);
  if(win.style.display==='none') return;
  win.style.display='none';
  if(minimizedWindows[id]) return;
  const icon = document.createElement('div');
  icon.className='start-icon';
  icon.textContent = win.querySelector('.window-header span').textContent;
  icon.onclick = ()=>{
    win.style.display='block'; bringToFront(win); icon.remove(); delete minimizedWindows[id];
  };
  startMenu.appendChild(icon);
  minimizedWindows[id]=icon;
}

// --- Timer ---
const timerText = document.getElementById("timerText");
const timerFill = document.getElementById("timerFill");
const timerContainer = document.getElementById("timerContainer");
const nameInput = document.getElementById("nameInput");
let startTime=null, interval=null, bubbles=[];

function createBubbles(){
  bubbles.forEach(b=>b.remove());
  bubbles=[];
  for(let i=0;i<20;i++){
    const b = document.createElement('div'); b.className='bubble';
    b.style.left=Math.random()*timerContainer.offsetWidth+'px';
    b.style.width=b.style.height=(2+Math.random()*4)+'px';
    b.style.animationDuration=(1+Math.random()*2)+'s';
    timerContainer.appendChild(b);
    bubbles.push(b);
  }
}

window.startTimer = function(){
  if(interval) return;
  startTime=Date.now();
  interval=setInterval(()=>{
    const elapsed=(Date.now()-startTime)/1000;
    timerText.textContent=elapsed.toFixed(2);
    // beer fill
    timerFill.style.width=Math.min(elapsed/10*100,100)+'%';
  },10);
  createBubbles();
};
window.resetTimer = function(){ clearInterval(interval); interval=null; startTime=null; timerText.textContent='0.00'; timerFill.style.width='0%'; bubbles.forEach(b=>b.remove()); bubbles=[]; };
window.stopTimer = function(){ clearInterval(interval); interval=null; };

// --- That's Baseball popup ---
window.openRandomBaseballWiki = async function(){
  try{
    const res = await fetch("https://en.wikipedia.org/w/api.php?origin=*&action=query&list=search&srsearch=baseball&format=json&srlimit=50");
    const data = await res.json();
    if(!data.query || !data.query.search || data.query.search.length===0) throw new Error();
    const page = data.query.search[Math.floor(Math.random()*data.query.search.length)];
    const url = `https://en.wikipedia.org/wiki/${page.title.replace(/ /g,'_')}`;
    const win = document.createElement('div'); win.className='window';
    win.style.width='600px'; win.style.height='400px';
    win.style.top='20px'; win.style.left=(window.innerWidth-620)+'px';
    bringToFront(win);
    const header=document.createElement('div'); header.className='window-header';
    const titleSpan=document.createElement('span'); titleSpan.textContent=page.title;
    const btnContainer=document.createElement('div'); btnContainer.style.display='flex'; btnContainer.style.gap='2px';
    const maxBtn=document.createElement('button'); maxBtn.className='min-btn'; maxBtn.textContent='⬜';
    let isMax=false, prevStyle={};
    maxBtn.addEventListener('click',()=>{
      if(!isMax){ prevStyle={left:win.style.left,top:win.style.top,width:win.style.width,height:win.style.height}; win.style.left='0'; win.style.top='0'; win.style.width='100%'; win.style.height='100%'; isMax=true;}
      else{ win.style.left=prevStyle.left; win.style.top=prevStyle.top; win.style.width=prevStyle.width; win.style.height=prevStyle.height; isMax=false;}
    });
    const closeBtn=document.createElement('button'); closeBtn.className='min-btn'; closeBtn.textContent='X'; closeBtn.addEventListener('click',()=>win.remove());
    btnContainer.appendChild(maxBtn); btnContainer.appendChild(closeBtn); header.appendChild(titleSpan); header.appendChild(btnContainer); win.appendChild(header);
    const body=document.createElement('div'); body.className='window-body'; body.style.padding='0'; body.style.height='calc(100% - 24px)';
    const iframe=document.createElement('iframe'); iframe.src=url; iframe.style.width='100%'; iframe.style.height='100%'; iframe.style.border='none'; body.appendChild(iframe); win.appendChild(body);
    document.body.appendChild(win); makeDraggable(win);
  } catch(err){ alert("Error fetching random baseball article."); console.error(err);}
};
</script>
</body>
</html>
