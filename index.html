<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barstool Yug Station</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    margin: 40px;
    transition: all 0.3s ease;
  }

  h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
  }

  #timer {
    font-size: 4em;
    margin: 20px 0;
    font-weight: bold;
  }

  button {
    padding: 10px 15px;
    font-size: 16px;
    margin: 5px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
  }

  .start { background: green; color: white; }
  .stop { background: red; color: white; }
  .reset { background: gray; color: white; }
  .tvmode { background: #0077ff; color: white; }

  input {
    padding: 8px;
    font-size: 16px;
    width: 200px;
  }

  table {
    margin: 30px auto;
    border-collapse: collapse;
    width: 700px;
    background: #222;
  }

  th, td {
    padding: 12px;
    border-bottom: 1px solid #444;
  }

  th { background: #333; }

  .rank1 { color: gold; font-weight: bold; font-size: 1.2em; }
  .rank2 { color: silver; }
  .rank3 { color: #cd7f32; }

  .tv {
    background: black;
  }

  .tv h1 { font-size: 4em; }
  .tv #timer { font-size: 7em; }
  .tv table { width: 90%; font-size: 1.5em; }

</style>
</head>
<body>

<h1>🍺 Barstool Yug Station</h1>

<div id="timer">0.00</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>
<button class="reset" onclick="resetTimer()">Reset</button>
<button class="tvmode" onclick="toggleTVMode()">TV Mode</button>

<br><br>

<input id="nameInput" type="text" placeholder="Enter name..." />

<h2>Leaderboard</h2>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>Time (sec)</th>
      <th>Date</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody id="leaderboard"></tbody>
</table>

<audio id="airhorn" src="https://www.soundjay.com/misc/sounds/air-horn.mp3"></audio>

<script>

let startTime = null;
let interval = null;
let leaderboard = JSON.parse(localStorage.getItem("yugLeaderboard") || "[]");

const timerDisplay = document.getElementById("timer");
const board = document.getElementById("leaderboard");
const airhorn = document.getElementById("airhorn");

function startTimer() {
  if (interval) return;
  startTime = Date.now();
  interval = setInterval(updateTimer, 10);
}

function updateTimer() {
  const elapsed = (Date.now() - startTime) / 1000;
  timerDisplay.textContent = elapsed.toFixed(2);
}

function stopTimer() {
  if (!interval) return;

  clearInterval(interval);
  interval = null;

  const finalTime = parseFloat(timerDisplay.textContent);
  const name = document.getElementById("nameInput").value.trim();

  if (!name) {
    alert("Enter a name first.");
    return;
  }

  const today = new Date().toLocaleDateString();

  const previousBest = leaderboard.length ? leaderboard[0].time : Infinity;

  leaderboard.push({ name, time: finalTime, date: today });
  leaderboard.sort((a, b) => a.time - b.time);

  localStorage.setItem("yugLeaderboard", JSON.stringify(leaderboard));
  renderLeaderboard();

  if (leaderboard[0].time < previousBest) {
    airhorn.play();
  }
}

function resetTimer() {
  clearInterval(interval);
  interval = null;
  timerDisplay.textContent = "0.00";
}

function deleteEntry(index) {
  leaderboard.splice(index, 1);
  localStorage.setItem("yugLeaderboard", JSON.stringify(leaderboard));
  renderLeaderboard();
}

function updateTime(index, newValue) {
  const parsed = parseFloat(newValue);
  if (isNaN(parsed)) return;

  leaderboard[index].time = parsed;
  leaderboard.sort((a, b) => a.time - b.time);

  localStorage.setItem("yugLeaderboard", JSON.stringify(leaderboard));
  renderLeaderboard();
}

function renderLeaderboard() {
  board.innerHTML = "";

  leaderboard.forEach((entry, index) => {

    let rankClass = "";
    if (index === 0) rankClass = "rank1";
    if (index === 1) rankClass = "rank2";
    if (index === 2) rankClass = "rank3";

    const row = document.createElement("tr");

    row.innerHTML = `
      <td class="${rankClass}">${index + 1}</td>
      <td>${entry.name}</td>
      <td>
        <input type="number" step="0.01" value="${entry.time.toFixed(2)}"
        onchange="updateTime(${index}, this.value)"
        style="width:80px;">
      </td>
      <td>${entry.date}</td>
      <td><button onclick="deleteEntry(${index})">X</button></td>
    `;

    board.appendChild(row);
  });
}

function toggleTVMode() {
  document.body.classList.toggle("tv");
}

renderLeaderboard();

</script>

</body>
</html>
