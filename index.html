<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barstool Yug Station - Retro 95</title>

<style>
body{
  font-family:'MS Sans Serif', Tahoma, Geneva, sans-serif;
  font-size:12px;
  background:#008080;
  margin:0;
  padding:20px;
}

/* Windows */
.window{
  background:#c0c0c0;
  border:2px solid #808080;
  position:absolute;
  box-shadow:2px 2px 0px #fff inset;
}

.window-header{
  background:#000080;
  color:white;
  font-weight:bold;
  padding:2px 5px;
  cursor:move;
  user-select:none;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.window-body{ padding:10px; }

.min-btn{
  background:#c0c0c0;
  border:2px outset #fff;
  width:18px;
  height:16px;
  font-size:10px;
  cursor:pointer;
  padding:0;
}
.min-btn:active{ border-style:inset; }

/* Timer */
#timerWindow{ width:360px; }
#timer{
  font-family:monospace;
  font-size:28px;
  font-weight:bold;
  margin:12px 0;
  padding:8px;
  background:#fff;
  border:2px solid #808080;
  width:100%;
  text-align:center;
}
#nameInput{
  width:100%;
  padding:6px;
  margin-bottom:8px;
}

/* Leaderboard */
#leaderboardWindow{ width:480px; }
#leaderboard table{
  width:100%;
  border-collapse:collapse;
  font-family:monospace;
}
#leaderboard th,#leaderboard td{
  border:1px solid #808080;
  padding:4px;
  font-size:12px;
}
#leaderboard th{
  background:#000080;
  color:white;
}
.rank1{ color:red;font-weight:bold; }

/* Baseball */
#baseballWindow{
  width:200px;
  bottom:50px;
  left:50px;
  top:auto !important;
}
#baseballWindow .window-body{
  text-align:center;
  cursor:pointer;
  font-weight:bold;
  color:#000080;
}
#baseballWindow .window-body:hover{ text-decoration:underline; }

/* Start Bar */
#startBar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:32px;
  background:#c0c0c0;
  border-top:2px solid #fff;
  display:flex;
  align-items:center;
}

#startButton{
  width:60px;
  height:24px;
  margin-left:4px;
  background:#c0c0c0;
  border:2px outset #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
#startButton:active{ border-style:inset; }

#taskbar{
  display:flex;
  margin-left:6px;
  gap:4px;
}

.task-btn{
  background:#c0c0c0;
  border:2px outset #fff;
  padding:2px 8px;
  cursor:pointer;
  font-size:12px;
}
.task-btn.active{
  border-style:inset;
}
</style>
</head>
<body>

<!-- Timer -->
<div class="window" id="timerWindow" style="top:50px; left:50px;">
  <div class="window-header">
    <span>Timer</span>
    <button class="min-btn" onclick="minimizeWindow('timerWindow')">_</button>
  </div>
  <div class="window-body">
    <div id="timer">0.00</div>
    <input id="nameInput" placeholder="Enter name..." />
    <div style="display:flex;gap:4px;">
      <button onclick="startTimer()">Start</button>
      <button onclick="stopTimer()">Stop</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>
</div>

<!-- Leaderboard -->
<div class="window" id="leaderboardWindow" style="top:50px; left:450px;">
  <div class="window-header">
    <span>Leaderboard</span>
    <button class="min-btn" onclick="minimizeWindow('leaderboardWindow')">_</button>
  </div>
  <div class="window-body">
    <table id="leaderboard">
      <thead>
        <tr><th>Rank</th><th>Name</th><th>Time</th><th>Date</th><th>X</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- That's Baseball -->
<div class="window" id="baseballWindow">
  <div class="window-header">
    <span>That's Baseball</span>
    <button class="min-btn" onclick="minimizeWindow('baseballWindow')">_</button>
  </div>
  <div class="window-body" onclick="openRandomWiki()">
    Click me!
  </div>
</div>

<!-- Start Bar -->
<div id="startBar">
  <div id="startButton">Start</div>
  <div id="taskbar"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* Firebase */
const firebaseConfig={
  apiKey:"YOUR_API_KEY",
  authDomain:"goatchase-e9502.firebaseapp.com",
  projectId:"goatchase-e9502"
};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const leaderboardCol=collection(db,"yugLeaderboard");

const timerDisplay=document.getElementById("timer");
const nameInput=document.getElementById("nameInput");
const board=document.querySelector("#leaderboard tbody");

let startTime=null;
let interval=null;
let leaderboard=[];
let zIndex=1;

/* Timer */
window.startTimer=function(){
  if(interval) return;
  startTime=Date.now();
  interval=setInterval(()=>{
    timerDisplay.textContent=((Date.now()-startTime)/1000).toFixed(2);
  },10);
};
window.resetTimer=function(){
  clearInterval(interval);
  interval=null;
  timerDisplay.textContent="0.00";
};
window.stopTimer=async function(){
  if(!interval) return;
  clearInterval(interval);
  interval=null;
  const name=nameInput.value.trim();
  if(!name) return alert("Enter name.");
  const time=parseFloat(timerDisplay.textContent);
  const date=new Date().toLocaleDateString();
  await addDoc(leaderboardCol,{name,time,date});
  resetTimer();
  nameInput.value="";
};

/* Firestore */
function renderLeaderboard(){
  board.innerHTML="";
  leaderboard.forEach((entry,i)=>{
    const row=document.createElement("tr");
    row.innerHTML=`
      <td class="${i===0?'rank1':''}">${i+1}</td>
      <td>${entry.name}</td>
      <td><input type="number" step="0.01" value="${entry.time.toFixed(2)}"
      onchange="updateTime('${entry.id}',this.value)"></td>
      <td>${entry.date}</td>
      <td><button onclick="deleteEntry('${entry.id}')">X</button></td>`;
    board.appendChild(row);
  });
}
onSnapshot(query(leaderboardCol,orderBy("time")),snap=>{
  leaderboard=[];
  snap.forEach(d=>leaderboard.push({id:d.id,...d.data()}));
  renderLeaderboard();
});
window.updateTime=async(id,val)=>{
  await updateDoc(doc(db,"yugLeaderboard",id),{time:parseFloat(val)});
};
window.deleteEntry=async(id)=>{
  await deleteDoc(doc(db,"yugLeaderboard",id));
};

/* Drag */
function makeDraggable(el){
  const header=el.querySelector(".window-header");
  let offsetX=0,offsetY=0,isDown=false;
  header.addEventListener("mousedown",e=>{
    isDown=true;
    offsetX=e.clientX-el.offsetLeft;
    offsetY=e.clientY-el.offsetTop;
    el.style.zIndex=++zIndex;
  });
  document.addEventListener("mousemove",e=>{
    if(!isDown) return;
    el.style.left=(e.clientX-offsetX)+"px";
    el.style.top=(e.clientY-offsetY)+"px";
  });
  document.addEventListener("mouseup",()=>isDown=false);
}
document.querySelectorAll(".window").forEach(makeDraggable);

/* Minimize to taskbar */
const taskbar=document.getElementById("taskbar");

window.minimizeWindow=function(id){
  const win=document.getElementById(id);
  win.style.display="none";

  if(document.getElementById("task-"+id)) return;

  const btn=document.createElement("div");
  btn.className="task-btn";
  btn.id="task-"+id;
  btn.textContent=win.querySelector(".window-header span").textContent;

  btn.onclick=function(){
    win.style.display="block";
    win.style.zIndex=++zIndex;
    taskbar.removeChild(btn);
  };

  taskbar.appendChild(btn);
};

/* Truly Random Baseball Wikipedia */
window.openRandomWiki=async function(){
  try{
    const res=await fetch(
      "https://en.wikipedia.org/w/api.php?action=query&list=random&rnnamespace=0&rnlimit=1&format=json&origin=*"
    );
    const data=await res.json();
    const title=data.query.random[0].title;

    if(title.toLowerCase().includes("baseball")){
      window.open("https://en.wikipedia.org/wiki/"+encodeURIComponent(title),"_blank");
    } else {
      openRandomWiki(); // retry until baseball-related
    }
  }catch(e){
    window.open("https://en.wikipedia.org/wiki/Baseball","_blank");
  }
};
</script>
</body>
</html>
