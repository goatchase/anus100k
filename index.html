<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barstool Yug Station - Retro 95</title>
<style>
body { font-family:'MS Sans Serif', Tahoma, Geneva, sans-serif; font-size:12px; background:#008080; color:black; margin:0; padding:20px;}
.window { background:#c0c0c0; border:2px solid #808080; position:absolute; box-shadow:2px 2px 0px #fff inset; cursor:default; }
.window-header { background:#000080; color:white; font-weight:bold; padding:2px 5px; cursor:move; user-select:none; }
.window-body { padding:10px; }

/* Timer Window */
#timerWindow { width:360px; }
#timer { font-family:'MS Sans Serif', monospace; font-size:28px; font-weight:bold; margin:12px 0; padding:8px; background:#fff; border:2px solid #808080; width:100%; box-sizing:border-box; text-align:center; }
#nameInput { width:100%; padding:6px; font-size:14px; margin-bottom:8px; box-sizing:border-box; }
.timer-buttons { display:flex; gap:4px; }
.timer-buttons button { flex:1; padding:6px 0; font-size:14px; }

/* Leaderboard window */
#leaderboardWindow { width:480px; }
#leaderboard table { width:100%; border-collapse:collapse; font-family:'MS Sans Serif', monospace; }
#leaderboard th, #leaderboard td { border:1px solid #808080; padding:4px 2px; font-size:12px; }
#leaderboard th { background:#000080; color:white; font-weight:bold; }
#leaderboard th:nth-child(1), #leaderboard td:nth-child(1) { text-align:center; }
#leaderboard th:nth-child(2), #leaderboard td:nth-child(2) { text-align:left; padding-left:6px; }
#leaderboard th:nth-child(3), #leaderboard td:nth-child(3),
#leaderboard th:nth-child(4), #leaderboard td:nth-child(4) { text-align:right; padding-right:6px; }
#leaderboard th:nth-child(5), #leaderboard td:nth-child(5) { text-align:center; }
.rank1 { color:red; font-weight:bold; }

/* Start bar */
#startBar { position:fixed; bottom:0; left:0; width:100%; height:30px; background:#c0c0c0; border-top:2px solid #fff; display:flex; align-items:center; padding-left:4px; box-sizing:border-box; font-weight:bold; }
#startButton { width:60px; height:24px; background:#c0c0c0; border:2px outset #fff; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; }
#startButton:active { border-style:inset; }

/* That's Baseball Window */
#baseballWindow { width:200px; text-align:center; bottom:50px; left:50px; top:auto !important; }
#baseballWindow .window-body { cursor:pointer; font-weight:bold; font-size:14px; color:#000080; }
#baseballWindow .window-body:hover { text-decoration:underline; }

input.time-input { width:60px; text-align:right; }
input.date-input { width:80px; text-align:right; }
</style>
</head>
<body>

<!-- Timer -->
<div class="window" id="timerWindow" style="top:50px; left:50px;">
  <div class="window-header">Timer</div>
  <div class="window-body">
    <div id="timer">0.00</div>
    <input id="nameInput" type="text" placeholder="Enter name..." /><br>
    <div class="timer-buttons">
      <button onclick="startTimer()">Start</button>
      <button onclick="stopTimer()">Stop</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>
</div>

<!-- Leaderboard -->
<div class="window" id="leaderboardWindow" style="top:50px; left:450px;">
  <div class="window-header">Leaderboard</div>
  <div class="window-body">
    <table id="leaderboard">
      <thead>
        <tr><th>Rank</th><th>Name</th><th>Time</th><th>Date</th><th>X</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- That's Baseball -->
<div class="window" id="baseballWindow">
  <div class="window-header">That's Baseball</div>
  <div class="window-body" onclick="openRandomFangraphs()">Click me!</div>
</div>

<!-- Airhorn -->
<audio id="airhorn" src="https://www.soundjay.com/misc/sounds/air-horn.mp3"></audio>

<!-- Start bar -->
<div id="startBar"><div id="startButton">Start</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBLX1aCaIrF4ro5cHQky2DrN1Sd-hooJyU",
  authDomain: "goatchase-e9502.firebaseapp.com",
  projectId: "goatchase-e9502",
  storageBucket: "goatchase-e9502.firebasestorage.app",
  messagingSenderId: "16998517478",
  appId: "1:16998517478:web:8985a2bf70d7df9bccc927",
  measurementId: "G-1432J8NJ77"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const leaderboardCol = collection(db,"yugLeaderboard");

const timerDisplay = document.getElementById("timer");
const nameInput = document.getElementById("nameInput");
const board = document.querySelector("#leaderboard tbody");
const airhorn = document.getElementById("airhorn");

let startTime=null;
let interval=null;
let leaderboard=[];

// Timer
window.startTimer = function(){
  if(interval) return;
  startTime = Date.now();
  interval = setInterval(()=>{ timerDisplay.textContent = ((Date.now()-startTime)/1000).toFixed(2); }, 10);
};
window.resetTimer = function(){ clearInterval(interval); interval=null; timerDisplay.textContent="0.00"; };
window.stopTimer = async function(){
  if(!interval) return;
  clearInterval(interval); interval=null;
  const name = nameInput.value.trim(); if(!name) return alert("Enter a name.");
  const time = parseFloat(timerDisplay.textContent);
  const date = new Date().toLocaleDateString();
  try { await addDoc(leaderboardCol,{name,time,date}); resetTimer(); nameInput.value=""; } 
  catch(e){ console.error("Firestore error:",e);}
};

// Render editable leaderboard
function renderLeaderboard(){
  board.innerHTML="";
  leaderboard.forEach((entry,i)=>{
    const row=document.createElement("tr");
    row.innerHTML=`
      <td class="${i===0?'rank1':''}">${i+1}</td>
      <td>${entry.name}</td>
      <td><input class="time-input" type="number" step="0.01" value="${entry.time.toFixed(2)}" onchange="updateTime('${entry.id}', this.value)"></td>
      <td><input class="date-input" type="text" value="${entry.date}" onchange="updateDate('${entry.id}', this.value)"></td>
      <td><button onclick="deleteEntry('${entry.id}')">X</button></td>
    `;
    board.appendChild(row);
  });
}

// Firestore real-time update
const q = query(leaderboardCol, orderBy("time"));
onSnapshot(q, snapshot=>{
  leaderboard=[];
  snapshot.forEach(docSnap=>leaderboard.push({id:docSnap.id,...docSnap.data()}));
  renderLeaderboard();
});

// Update Firestore
window.updateTime = async function(id,value){ await updateDoc(doc(db,"yugLeaderboard",id),{time:parseFloat(value)}); };
window.updateDate = async function(id,value){ await updateDoc(doc(db,"yugLeaderboard",id),{date:value}); };
window.deleteEntry = async function(id){ await deleteDoc(doc(db,"yugLeaderboard",id)); };

// Drag windows
function makeDraggable(el){
  const header = el.querySelector('.window-header');
  let offsetX=0, offsetY=0, isDown=false;
  header.addEventListener('mousedown',e=>{isDown=true; offsetX=e.clientX-el.offsetLeft; offsetY=e.clientY-el.offsetTop; el.style.zIndex=1000;});
  document.addEventListener('mousemove',e=>{if(!isDown) return; el.style.left=(e.clientX-offsetX)+'px'; el.style.top=(e.clientY-offsetY)+'px';});
  document.addEventListener('mouseup',e=>{isDown=false;});
}
makeDraggable(document.getElementById('timerWindow'));
makeDraggable(document.getElementById('leaderboardWindow'));
makeDraggable(document.getElementById('baseballWindow'));

// Random Fangraphs player
window.openRandomFangraphs = function(){
  const players = ["mookie-betts","mike-trout","aaron-judge","ronald-acuna-jr","tatis-felix","freddie-freeman","julio-rodriguez","scherzer-max"];
  const player = players[Math.floor(Math.random()*players.length)];
  window.open(`https://www.fangraphs.com/players/${player}`,"_blank");
};
</script>
</body>
</html>
