<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barstool Yug Station - Retro 95</title>
<style>
body {
  font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif;
  font-size: 12px;
  background: #008080;
  color: black;
  margin: 0;
  padding: 20px;
}

/* Draggable windows */
.window {
  background: #c0c0c0;
  border: 2px solid #808080;
  position: absolute;
  box-shadow: 2px 2px 0px #fff inset;
  cursor: default;
}

.window-header {
  background: #000080;
  color: white;
  font-weight: bold;
  padding: 2px 5px;
  cursor: move;
  user-select: none;
}

.window-body {
  padding: 10px;
}

/* Timer Window */
#timerWindow { width: 360px; }
#timer { 
  font-family: 'MS Sans Serif', monospace;
  font-size: 28px; 
  font-weight: bold; 
  margin: 12px 0; 
  padding: 8px; 
  background: #ffffff; 
  border: 2px solid #808080; 
  width: 220px; 
  text-align: center;
}
#nameInput {
  width: 220px;
  padding: 6px;
  font-size: 14px;
  margin-bottom: 8px;
}
.timer-buttons button {
  padding: 6px 12px;
  font-size: 14px;
  margin: 4px 4px 0 0;
}

/* Leaderboard window */
#leaderboardWindow { width: 440px; }
#leaderboard table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'MS Sans Serif', monospace;
}
#leaderboard th, #leaderboard td {
  border: 1px solid #808080;
  padding: 4px 2px;
  font-size: 12px;
}
#leaderboard th { background: #000080; color: white; font-weight: bold; }

/* Leaderboard alignment */
#leaderboard th:nth-child(1), #leaderboard td:nth-child(1) { text-align: center; }
#leaderboard th:nth-child(2), #leaderboard td:nth-child(2) { text-align: left; padding-left: 6px; }
#leaderboard th:nth-child(3), #leaderboard td:nth-child(3),
#leaderboard th:nth-child(4), #leaderboard td:nth-child(4) { text-align: right; padding-right: 6px; }
#leaderboard th:nth-child(5), #leaderboard td:nth-child(5) { text-align: center; }

.rank1 { color: red; font-weight: bold; }

/* Start bar */
#startBar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 30px;
  background: #c0c0c0;
  border-top: 2px solid #fff;
  display: flex;
  align-items: center;
  padding-left: 4px;
  box-sizing: border-box;
  font-weight: bold;
}
#startButton {
  width: 60px;
  height: 24px;
  background: #c0c0c0;
  border: 2px outset #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 12px;
}
#startButton:active { border-style: inset; }

/* That's Baseball window */
#baseballWindow { width: 200px; text-align: center; }
#baseballWindow .window-body {
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
  color: #000080;
}
#baseballWindow .window-body:hover { text-decoration: underline; }

/* Yug Logo window */
#logoWindow { width: 250px; text-align: center; }
#logoWindow img { width: 100%; }
</style>
</head>
<body>

<!-- Timer Window -->
<div class="window" id="timerWindow" style="top:50px; left:50px;">
  <div class="window-header">Timer</div>
  <div class="window-body">
    <div id="timer">0.00</div>
    <input id="nameInput" type="text" placeholder="Enter name..." /><br>
    <div class="timer-buttons">
      <button onclick="startTimer()">Start</button>
      <button onclick="stopTimer()">Stop</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>
</div>

<!-- Leaderboard Window -->
<div class="window" id="leaderboardWindow" style="top:50px; left:450px;">
  <div class="window-header">Leaderboard</div>
  <div class="window-body" id="leaderboardContainer">
    <table id="leaderboard">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th>Time</th>
          <th>Date</th>
          <th>X</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- That's Baseball Window -->
<div class="window" id="baseballWindow" style="top:250px; left:50px;">
  <div class="window-header">That's Baseball</div>
  <div class="window-body" onclick="openRandomPlayer()">Click me!</div>
</div>

<!-- Yug Logo Window -->
<div class="window" id="logoWindow" style="top:400px; left:50px;">
  <div class="window-header">Yug Station Logo</div>
  <div class="window-body">
    <img src="https://via.placeholder.com/250x100.png?text=Yug+Station+Logo" alt="Yug Station Logo" />
  </div>
</div>

<!-- Airhorn -->
<audio id="airhorn" src="https://www.soundjay.com/misc/sounds/air-horn.mp3"></audio>

<!-- Start bar -->
<div id="startBar">
  <div id="startButton">Start</div>
</div>

<script>
// Timer logic
let startTime = null;
let interval = null;
let leaderboard = JSON.parse(localStorage.getItem("yugLeaderboard") || "[]");

const timerDisplay = document.getElementById("timer");
const board = document.querySelector("#leaderboard tbody");
const airhorn = document.getElementById("airhorn");
const nameInput = document.getElementById("nameInput");

function startTimer() {
  if(interval) return;
  startTime = Date.now();
  interval = setInterval(updateTimer, 10);
}

function updateTimer() {
  const elapsed = (Date.now() - startTime)/1000;
  timerDisplay.textContent = elapsed.toFixed(2);
}

function stopTimer() {
  if(!interval) return;
  clearInterval(interval);
  interval = null;
  const finalTime = parseFloat(timerDisplay.textContent);
  const name = nameInput.value.trim();
  if(!name) return alert("Enter a name.");
  const today = new Date().toLocaleDateString();
  const previousBest = leaderboard.length ? leaderboard[0].time : Infinity;
  leaderboard.push({name,time:finalTime,date:today});
  leaderboard.sort((a,b)=>a.time-b.time);
  localStorage.setItem("yugLeaderboard",JSON.stringify(leaderboard));
  renderLeaderboard();
  if(leaderboard[0].time < previousBest) airhorn.play();
  resetTimer();
  nameInput.value = "";
}

function resetTimer() {
  clearInterval(interval);
  interval = null;
  timerDisplay.textContent = "0.00";
}

function deleteEntry(index){
  leaderboard.splice(index,1);
  localStorage.setItem("yugLeaderboard",JSON.stringify(leaderboard));
  renderLeaderboard();
}

function updateTime(index,value){
  const parsed = parseFloat(value);
  if(isNaN(parsed)) return;
  leaderboard[index].time = parsed;
  leaderboard.sort((a,b)=>a.time-b.time);
  localStorage.setItem("yugLeaderboard",JSON.stringify(leaderboard));
  renderLeaderboard();
}

function updateDate(index,value){
  leaderboard[index].date = value;
  localStorage.setItem("yugLeaderboard",JSON.stringify(leaderboard));
  renderLeaderboard();
}

function renderLeaderboard(){
  board.innerHTML = "";
  leaderboard.forEach((entry,index)=>{
    const row = document.createElement("tr");
    row.innerHTML = `
      <td class="${index===0?'rank1':''}">${index+1}</td>
      <td>${entry.name}</td>
      <td><input type="number" step="0.01" value="${entry.time.toFixed(2)}" onchange="updateTime(${index}, this.value)" style="width:60px;"></td>
      <td><input type="text" value="${entry.date}" onchange="updateDate(${index}, this.value)" style="width:80px;text-align:right;"></td>
      <td><button onclick="deleteEntry(${index})">X</button></td>
    `;
    board.appendChild(row);
  });
}

renderLeaderboard();

// Dragging logic
function makeDraggable(el) {
  const header = el.querySelector('.window-header');
  let offsetX=0, offsetY=0, isDown=false;
  header.addEventListener('mousedown', e=>{
    isDown=true;
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;
    el.style.zIndex = 1000;
  });
  document.addEventListener('mousemove', e=>{
    if(!isDown) return;
    el.style.left = (e.clientX - offsetX) + 'px';
    el.style.top = (e.clientY - offsetY) + 'px';
  });
  document.addEventListener('mouseup', e=>{
    isDown=false;
  });
}

makeDraggable(document.getElementById('timerWindow'));
makeDraggable(document.getElementById('leaderboardWindow'));
makeDraggable(document.getElementById('baseballWindow'));
makeDraggable(document.getElementById('logoWindow'));

// Truly random Baseball-Reference player (fixed demo list)
function openRandomPlayer() {
  const demoPlayers = [
    "bondsba01", // Barry Bonds
    "ripkera01", // Cal Ripken
    "griffke01", // Ken Griffey Jr
    "ruthba01",  // Babe Ruth
    "aaronha01"  // Hank Aaron
  ];
  const playerID = demoPlayers[Math.floor(Math.random()*demoPlayers.length)];
  const firstLetter = playerID[0];
  window.open(`https://www.baseball-reference.com/players/${firstLetter}/${playerID}.shtml`, "_blank");
}
</script>

</body>
</html>
