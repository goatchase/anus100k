<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barstool Yug Station - Retro 95</title>

<style>
body {
  font-family:'MS Sans Serif', Tahoma, Geneva, sans-serif;
  font-size:12px;
  background:#008080;
  color:black;
  margin:0;
  padding:20px;
}
* { box-sizing: border-box; }

/* Windows */
.window {
  background:#c0c0c0;
  border:2px solid #808080;
  position:absolute;
  box-shadow:2px 2px 0px #fff inset;
  cursor:default;
}
.window-header {
  background:#000080;
  color:white;
  font-weight:bold;
  padding:2px 5px;
  cursor:move;
  user-select:none;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.min-btn {
  background:#c0c0c0;
  border:2px outset #fff;
  width:18px;
  height:16px;
  font-size:10px;
  line-height:10px;
  cursor:pointer;
  padding:0;
}
.min-btn:active { border-style:inset; }
.window-body { padding:10px; }

/* Timer */
#timerWindow { width: 300px; }
#nameInput { 
  width: 100%; 
  padding: 4px; 
  font-size: 12px; 
  margin-top: 12px; 
  box-sizing: border-box;
}
.timer-buttons { display:flex; gap:4px; margin-top:6px; }
.timer-buttons button { flex:1; padding:4px 0; font-size:12px; cursor:pointer; }

/* Timer bar */
#timerContainer {
  position:relative;
  width:100%;
  height:40px;
  background:#fff;
  border:2px solid #808080;
  overflow:hidden;
  border-radius:4px;
  margin-bottom:6px;
}
#timerFill {
  position:absolute;
  left:0; top:0;
  height:100%;
  width:0%;
  background: linear-gradient(to top, #f4d35e 0%, #ffd966 80%);
  z-index:0;
}
#timerText {
  position:relative;
  z-index:2;
  font-family:monospace;
  font-size:28px;
  font-weight:bold;
  text-align:center;
  line-height:40px;
}

/* Bubble foam */
.bubble {
  position:absolute;
  bottom:0;
  width:4px;
  height:4px;
  border-radius:50%;
  background:white;
  opacity:0.8;
  animation: rise 2s linear infinite;
  z-index:1;
}
@keyframes rise {
  0% { transform: translateY(0) scale(0.8); opacity:0.8; }
  50% { transform: translateY(-30px) scale(1); opacity:0.9; }
  100% { transform: translateY(-50px) scale(0.8); opacity:0; }
}

/* Leaderboard */
#leaderboardWindow { width:480px; }
#leaderboardWindow .window-body {
  padding:10px;
  max-height:600px;
  overflow-y:auto;
}
#leaderboard table {
  width:100%;
  border-collapse:collapse;
  font-family: monospace;
}
#leaderboard th, #leaderboard td {
  border:1px solid #808080;
  padding:4px 6px;
  font-size:12px;
}
#leaderboard th {
  background:#000080;
  color:white;
  font-weight:bold;
}
#leaderboard th:nth-child(1), #leaderboard td:nth-child(1) { text-align:center; width:50px; }
#leaderboard th:nth-child(2), #leaderboard td:nth-child(2) { text-align:left; padding-left:6px; width:180px; }
#leaderboard th:nth-child(3), #leaderboard td:nth-child(3),
#leaderboard th:nth-child(4), #leaderboard td:nth-child(4) { text-align:right; padding-right:4px; width:auto; }
#leaderboard th:nth-child(5), #leaderboard td:nth-child(5) { text-align:center; width:50px; }
.rank1 { color:red; font-weight:bold; }

/* Inputs fill cells */
input.time-input, input.date-input {
  width:100%;
  box-sizing:border-box;
  text-align:right;
  border:1px solid #808080;
  padding:2px 4px;
  font-size:12px;
}

/* That's Baseball */
#baseballWindow { width:200px; text-align:center; bottom:50px; left:50px; top:auto !important; }
#baseballWindow .window-body { cursor:pointer; font-weight:bold; font-size:14px; color:#000080; }
#baseballWindow .window-body:hover { text-decoration:underline; }

/* Yug Stats Window */
#yugStatsWindow { width:200px; }
#yugStatsWindow .window-body { font-weight:bold; position:relative; overflow:hidden; }
#yugStatsWindow #yugImage { position:relative; z-index:2; max-width:120px; height:auto; }

/* Start bar */
#startBar {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:30px;
  background:#c0c0c0;
  border-top:2px solid #fff;
  display:flex;
  align-items:center;
  padding-left:4px;
  box-sizing:border-box;
  font-weight:bold;
}
#startButton {
  width:60px;
  height:24px;
  background:#c0c0c0;
  border:2px outset #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:12px;
}
#startButton:active { border-style:inset; }
</style>
</head>
<body>

<!-- Timer Window -->
<div class="window" id="timerWindow" style="top:50px; left:50px;">
  <div class="window-header">
    <span>Timer</span>
    <button class="min-btn" onclick="toggleWindow('timerWindow')">_</button>
  </div>
  <div class="window-body">
    <div id="timerContainer">
      <div id="timerFill"></div>
      <div id="timerText">0.00</div>
    </div>
    <input id="nameInput" type="text" placeholder="Enter name..." />
    <div class="timer-buttons">
      <button onclick="startTimer()">Start</button>
      <button onclick="stopTimer()">Stop</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>
</div>

<!-- Leaderboard Window -->
<div class="window" id="leaderboardWindow" style="top:50px; left:450px;">
  <div class="window-header">
    <span>Leaderboard</span>
    <button class="min-btn" onclick="toggleWindow('leaderboardWindow')">_</button>
  </div>
  <div class="window-body">
    <table id="leaderboard">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th>Time</th>
          <th>Date</th>
          <th>X</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- That's Baseball -->
<div class="window" id="baseballWindow">
  <div class="window-header">
    <span>That's Baseball</span>
    <button class="min-btn" onclick="toggleWindow('baseballWindow')">_</button>
  </div>
  <div class="window-body" onclick="openRandomBaseballWiki()">
    ⚾ Click me!
  </div>
</div>

<!-- Yug Stats Window -->
<div class="window" id="yugStatsWindow" style="top:50px; left:950px;">
  <div class="window-header">
    <span>Yug Stats</span>
    <button class="min-btn" onclick="toggleWindow('yugStatsWindow')">_</button>
  </div>
  <div class="window-body">
    <div>Total Yugs: <span id="totalYugs">0</span></div>
    <div>Total Yug Time: <span id="totalYugTime">0.00</span></div>
    <div style="margin-top:10px; position:relative; height:120px;">
      <img id="yugImage" src="https://raw.githubusercontent.com/goatchase/anus100k/main/Yug.jpg" alt="Yug" />
    </div>
  </div>
</div>

<audio id="airhorn" src="https://www.soundjay.com/misc/sounds/air-horn.mp3"></audio>

<div id="startBar">
  <div id="startButton">Start</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "goatchase-e9502.firebaseapp.com",
  projectId: "goatchase-e9502",
  storageBucket: "goatchase-e9502.firebasestorage.app",
  messagingSenderId: "16998517478",
  appId: "1:16998517478:web:8985a2bf70d7df9bccc927"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const leaderboardCol = collection(db,"yugLeaderboard");

const timerText = document.getElementById("timerText");
const timerFill = document.getElementById("timerFill");
const timerContainer = document.getElementById("timerContainer");
const nameInput = document.getElementById("nameInput");
const board = document.querySelector("#leaderboard tbody");
const totalYugsEl = document.getElementById("totalYugs");
const totalYugTimeEl = document.getElementById("totalYugTime");

let startTime=null;
let interval=null;
let leaderboard=[];
let fastestTime=Infinity;
let bubbles = [];
let yugBubbles = [];

// Helper: format date MM/DD/YY
function formatDate(d){
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${dd}/${yy}`;
}

// Timer functions
window.startTimer = function(){
  if(interval) return;
  startTime = Date.now();
  interval = setInterval(updateTimerDisplay, 10);
  bubbles.forEach(b=>b.remove());
  bubbles=[];
  createBubbles();
};
window.resetTimer = function(){
  clearInterval(interval);
  interval=null;
  startTime=null;
  timerText.textContent="0.00";
  timerFill.style.width="0%";
  bubbles.forEach(b=>b.remove());
  bubbles=[];
};
window.stopTimer = async function(){
  if(!interval) return;
  clearInterval(interval);
  interval=null;
  const name = nameInput.value.trim();
  if(!name) return alert("Enter a name.");
  const time = parseFloat(timerText.textContent);
  const date = formatDate(new Date());
  await addDoc(leaderboardCol,{name,time,date});
  resetTimer();
  nameInput.value="";
};
function updateTimerDisplay(){
  if(!startTime) return;
  const elapsed = (Date.now()-startTime)/1000;
  timerText.textContent = elapsed.toFixed(2);
  if(fastestTime<Infinity){
    let percent = Math.min((elapsed/fastestTime)*100,100);
    timerFill.style.width = percent+"%";
  }
}

// Firestore functions
function updateYugStats() {
  const totalYugs = leaderboard.length * 2;
  const totalTime = leaderboard.reduce((sum, e) => sum + e.time, 0);
  totalYugsEl.textContent = totalYugs;
  totalYugTimeEl.textContent = (totalTime/60).toFixed(2) + " min";
}

function updateFastestTime(){
  if(leaderboard.length===0){
    fastestTime=Infinity;
    return;
  }
  fastestTime = Math.min(...leaderboard.map(e=>e.time));
}

function renderLeaderboard(){
  board.innerHTML="";
  leaderboard.forEach((entry,i)=>{
    const row=document.createElement("tr");
    row.innerHTML=`
      <td class="${i===0?'rank1':''}">${i+1}</td>
      <td>${entry.name}</td>
      <td><input class="time-input" type="number" step="0.01"
        value="${entry.time.toFixed(2)}"
        onchange="updateTime('${entry.id}', this.value)"></td>
      <td><input class="date-input" type="text"
        value="${entry.date}"
        onchange="updateDate('${entry.id}', this.value)"></td>
      <td><button onclick="deleteEntry('${entry.id}')">X</button></td>
    `;
    board.appendChild(row);
  });
  updateFastestTime();
  updateYugStats();
}

const q = query(leaderboardCol, orderBy("time"));
onSnapshot(q, snapshot=>{
  leaderboard=[];
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    data.date = formatDate(new Date(data.date));
    leaderboard.push({id:docSnap.id,...data});
  });
  renderLeaderboard();
});

window.updateTime = async function(id,value){
  await updateDoc(doc(db,"yugLeaderboard",id),{time:parseFloat(value)});
  updateFastestTime();
  updateYugStats();
};
window.updateDate = async function(id,value){
  await updateDoc(doc(db,"yugLeaderboard",id),{date:value});
};
window.deleteEntry = async function(id){
  await deleteDoc(doc(db,"yugLeaderboard",id));
  updateFastestTime();
  updateYugStats();
};

// Timer bubbles
function createBubbles(container=timerContainer){
  const count = 20;
  for(let i=0;i<count;i++){
    const b = document.createElement('div');
    b.className='bubble';
    b.style.left = Math.random()*container.offsetWidth+'px';
    b.style.animationDuration = (1 + Math.random()*1.5)+'s';
    container.appendChild(b);
    bubbles.push(b);
  }
}

// Yug Stats bubbles
function createYugBubbles(){
  const container = document.getElementById('yugStatsWindow').querySelector('.window-body');
  yugBubbles.forEach(b=>b.remove());
  yugBubbles=[];
  const count = 15;
  for(let i=0;i<count;i++){
    const b = document.createElement('div');
    b.className='bubble';
    b.style.left = Math.random()*container.offsetWidth+'px';
    b.style.bottom = '0px';
    b.style.width = (3 + Math.random()*4)+'px';
    b.style.height = b.style.width;
    b.style.animationDuration = (1.5 + Math.random()*2)+'s';
    container.appendChild(b);
    yugBubbles.push(b);
  }
}
createYugBubbles();
setInterval(createYugBubbles, 10000);

// Draggable windows
function makeDraggable(el){
  const header = el.querySelector('.window-header');
  let offsetX=0, offsetY=0, isDown=false, topZ=1000;
  header.addEventListener('mousedown',e=>{
    isDown=true;
    offsetX=e.clientX-el.offsetLeft;
    offsetY=e.clientY-el.offsetTop;
    topZ++;
    el.style.zIndex=topZ;
  });
  document.addEventListener('mousemove',e=>{
    if(!isDown) return;
    el.style.left=(e.clientX-offsetX)+'px';
    el.style.top=(e.clientY-offsetY)+'px';
  });
  document.addEventListener('mouseup',()=>{ isDown=false; });
}
makeDraggable(document.getElementById('timerWindow'));
makeDraggable(document.getElementById('leaderboardWindow'));
makeDraggable(document.getElementById('baseballWindow'));
makeDraggable(document.getElementById('yugStatsWindow'));

// Minimize
window.toggleWindow = function(id){
  const win=document.getElementById(id);
  const body=win.querySelector('.window-body');
  body.style.display = body.style.display==="none" ? "block" : "none";
};

// That's Baseball internal window
// That's Baseball internal window
window.openRandomBaseballWiki = async function() {
  try {
    // Fetch random baseball pages
    const res = await fetch(
      "https://en.wikipedia.org/w/api.php?origin=*&action=query&list=search&srsearch=baseball&format=json&srlimit=50"
    );
    const data = await res.json();
    if (!data.query || !data.query.search || data.query.search.length === 0) {
      throw new Error("No baseball pages found.");
    }
    const page = data.query.search[Math.floor(Math.random() * data.query.search.length)];
    const url = `https://en.wikipedia.org/wiki/${page.title.replace(/ /g,'_')}`;

    // Create new internal window
    const win = document.createElement('div');
    win.className = 'window';
    win.style.width = '600px';
    win.style.height = '400px';
    win.style.overflow = 'hidden';

    // Position to the right of the page
    const pageWidth = window.innerWidth;
    const winWidth = 600;
    win.style.left = (pageWidth - winWidth - 20) + 'px'; // 20px from right edge
    win.style.top = '100px';

    // Window header
    const header = document.createElement('div');
    header.className = 'window-header';
    header.style.display = 'flex';
    header.style.justifyContent = 'space-between';
    header.style.alignItems = 'center';

    // Title span
    const titleSpan = document.createElement('span');
    titleSpan.textContent = page.title;

    // Buttons container
    const btnContainer = document.createElement('div');
    btnContainer.style.display = 'flex';
    btnContainer.style.gap = '2px';

    // Minimize button
    const minBtn = document.createElement('button');
    minBtn.className = 'min-btn';
    minBtn.textContent = '_';
    minBtn.addEventListener('click', () => {
      const body = win.querySelector('.window-body');
      body.style.display = body.style.display === "none" ? "block" : "none";
    });

    // Close button
    const closeBtn = document.createElement('button');
    closeBtn.className = 'min-btn';
    closeBtn.textContent = 'X';
    closeBtn.addEventListener('click', () => win.remove());

    // Add buttons to container
    btnContainer.appendChild(minBtn);
    btnContainer.appendChild(closeBtn);

    // Add title and buttons to header
    header.appendChild(titleSpan);
    header.appendChild(btnContainer);
    win.appendChild(header);

    // Window body with iframe
    const body = document.createElement('div');
    body.className = 'window-body';
    body.style.padding = '0';
    body.style.height = 'calc(100% - 24px)';

    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    body.appendChild(iframe);
    win.appendChild(body);

    // Add to document
    document.body.appendChild(win);

    // Make draggable
    makeDraggable(win);

  } catch (err) {
    alert("Error fetching random baseball article.");
    console.error(err);
  }
};
</script>

</body>
</html>
