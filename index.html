<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barstool Yug Station - Retro 95</title>

<style>
  body {
    font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif;
    background: #c0c0c0;
    color: black;
    text-align: center;
    margin: 20px;
  }

  h1 {
    font-size: 1.8em;
    margin-bottom: 10px;
    font-weight: bold;
  }

  #timer {
    font-family: monospace;
    font-size: 2em;
    font-weight: bold;
    margin: 15px 0;
    padding: 10px;
    background: #ffffff;
    border: 2px solid #808080;
    width: 200px;
    margin-left: auto;
    margin-right: auto;
  }

  input {
    padding: 4px;
    font-size: 14px;
    width: 180px;
    border: 2px inset #ffffff;
    margin-bottom: 8px;
  }

  button {
    padding: 4px 10px;
    font-size: 14px;
    margin: 4px;
    border: 2px outset #ffffff;
    background: #c0c0c0;
    cursor: pointer;
    font-weight: bold;
  }

  button:active {
    border-style: inset;
  }

  #leaderboardContainer {
    margin-top: 20px;
    border: 2px solid #808080;
    background: #ffffff;
    max-height: 400px;
    overflow-y: scroll;
    width: 700px;
    margin-left: auto;
    margin-right: auto;
    padding: 2px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    font-family: monospace;
  }

  th, td {
    border: 1px solid #808080;
    padding: 4px;
    text-align: center;
  }

  th {
    background: #000080;
    color: white;
    font-weight: bold;
  }

  .rank1 {
    color: red;
    font-weight: bold;
  }

  .tv {
    font-size: 1.5em;
  }

  .tv #timer {
    font-size: 4em;
  }

</style>
</head>
<body>

<h1>Barstool Yug Station</h1>
<p>Chug your beer fast — Retro 95 Style</p>

<div id="timer">0.00</div>

<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>
<button onclick="toggleTVMode()">TV Mode</button>

<br><br>

<input id="nameInput" type="text" placeholder="Enter name..." />

<div id="leaderboardContainer">
<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>Time</th>
      <th>Date</th>
      <th>X</th>
    </tr>
  </thead>
  <tbody id="leaderboard"></tbody>
</table>
</div>

<audio id="airhorn" src="https://www.soundjay.com/misc/sounds/air-horn.mp3"></audio>

<script>
let startTime = null;
let interval = null;
let leaderboard = JSON.parse(localStorage.getItem("yugLeaderboard") || "[]");

const timerDisplay = document.getElementById("timer");
const board = document.getElementById("leaderboard");
const airhorn = document.getElementById("airhorn");

function startTimer() {
  if (interval) return;
  startTime = Date.now();
  interval = setInterval(updateTimer, 10);
}

function updateTimer() {
  const elapsed = (Date.now() - startTime) / 1000;
  timerDisplay.textContent = elapsed.toFixed(2);
}

function stopTimer() {
  if (!interval) return;

  clearInterval(interval);
  interval = null;

  const finalTime = parseFloat(timerDisplay.textContent);
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return alert("Enter a name.");

  const today = new Date().toLocaleDateString();
  const previousBest = leaderboard.length ? leaderboard[0].time : Infinity;

  leaderboard.push({ name, time: finalTime, date: today });
  leaderboard.sort((a,b) => a.time - b.time);

  localStorage.setItem("yugLeaderboard", JSON.stringify(leaderboard));
  renderLeaderboard();

  if (leaderboard[0].time < previousBest) {
    airhorn.play();
  }

  resetTimer();
}

function resetTimer() {
  clearInterval(interval);
  interval = null;
  timerDisplay.textContent = "0.00";
}

function deleteEntry(index) {
  leaderboard.splice(index,1);
  localStorage.setItem("yugLeaderboard", JSON.stringify(leaderboard));
  renderLeaderboard();
}

function updateTime(index, value) {
  const parsed = parseFloat(value);
  if (isNaN(parsed)) return;

  leaderboard[index].time = parsed;
  leaderboard.sort((a,b) => a.time - b.time);

  localStorage.setItem("yugLeaderboard", JSON.stringify(leaderboard));
  renderLeaderboard();
}

function renderLeaderboard() {
  board.innerHTML = "";

  leaderboard.forEach((entry,index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td class="${index === 0 ? 'rank1' : ''}">${index+1}</td>
      <td>${entry.name}</td>
      <td>
        <input type="number" step="0.01"
          value="${entry.time.toFixed(2)}"
          onchange="updateTime(${index}, this.value)"
          style="width:70px;">
      </td>
      <td>${entry.date}</td>
      <td><button onclick="deleteEntry(${index})">X</button></td>
    `;

    board.appendChild(row);
  });
}

function toggleTVMode() {
  document.body.classList.toggle("tv");
}

renderLeaderboard();
</script>

</body>
</html>
