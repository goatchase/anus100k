<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yug Station</title>

<style>

body{
font-family:'MS Sans Serif',Tahoma,Geneva,sans-serif;
font-size:12px;
background:#008080;
color:black;
margin:0;
padding:20px;
}

*{box-sizing:border-box}

/* WINDOWS */

.window{
background:#c0c0c0;
border:2px solid #808080;
position:absolute;
box-shadow:2px 2px 0px #fff inset;
}

.window-header{
background:#000080;
color:white;
font-weight:bold;
padding:2px 5px;
cursor:move;
display:flex;
justify-content:space-between;
align-items:center;
}

.min-btn{
background:#c0c0c0;
border:2px outset #fff;
width:18px;
height:16px;
cursor:pointer;
font-size:10px;
}

.min-btn:active{border-style:inset}

.window-body{
padding:10px;
}

/* TIMER */

#timerWindow{width:300px}

#timerContainer{
position:relative;
width:100%;
height:40px;
background:white;
border:2px solid #808080;
margin-bottom:6px;
overflow:hidden;
}

#timerFill{
position:absolute;
left:0;
top:0;
height:100%;
width:0%;
background:linear-gradient(to top,#f4d35e,#ffd966);
}

#timerText{
position:relative;
font-family:monospace;
font-size:28px;
text-align:center;
line-height:40px;
font-weight:bold;
}

.timer-buttons{
display:flex;
gap:4px;
margin-top:6px;
}

.timer-buttons button{
flex:1;
padding:4px;
cursor:pointer;
}

#nameInput{
width:100%;
margin-top:10px;
padding:4px;
}

/* LEADERBOARD */

#leaderboardWindow{
width:700px;
top:50px;
left:380px;
}

#leaderboard table{
width:100%;
border-collapse:collapse;
font-family:monospace;
}

#leaderboard th,#leaderboard td{
border:1px solid #808080;
padding:4px;
}

#leaderboard th{
background:#000080;
color:white;
}

.rank1{
color:red;
font-weight:bold;
}

input.time-input{
width:100%;
text-align:right;
border:1px solid #808080;
padding:2px;
}

/* BEER FOAM */

.beerbar{
background:
linear-gradient(to right,#f6c945 0%,#f2b705 var(--percent),transparent var(--percent)),
linear-gradient(to bottom,rgba(255,255,255,.9)0%,rgba(255,255,255,.7)10%,transparent 20%);
background-size:100% 100%,100% 30%;
background-repeat:no-repeat;
}

/* START BAR */

#startBar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:30px;
background:#c0c0c0;
border-top:2px solid #fff;
display:flex;
align-items:center;
padding-left:4px;
}

#startButton{
width:60px;
height:24px;
border:2px outset #fff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:bold;
}

#startButton:active{
border-style:inset;
}

#taskbar{
display:flex;
gap:4px;
margin-left:6px;
}

.task-button{
background:#c0c0c0;
border:2px outset #fff;
padding:2px 8px;
cursor:pointer;
}

.task-button:active{
border-style:inset;
}

/* START MENU */

#startMenu{
position:fixed;
bottom:30px;
left:0;
width:180px;
background:#c0c0c0;
border:2px outset #fff;
display:none;
}

.menu-item{
padding:6px 10px;
cursor:pointer;
}

.menu-item:hover{
background:#000080;
color:white;
}

/* STATS */

#yugStatsWindow{
width:200px;
bottom:50px;
right:20px;
top:auto!important;
}

</style>
</head>

<body>

<!-- TIMER WINDOW -->

<div class="window" id="timerWindow" style="top:50px;left:50px;">

<div class="window-header">
<span>Timer</span>
<button class="min-btn" onclick="toggleWindow('timerWindow')">_</button>
</div>

<div class="window-body">

<div id="timerContainer">
<div id="timerFill"></div>
<div id="timerText">0.00</div>
</div>

<input id="nameInput" placeholder="Enter name">

<div class="timer-buttons">
<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>
</div>

</div>
</div>

<!-- LEADERBOARD -->

<div class="window" id="leaderboardWindow">

<div class="window-header">
<span>Leaderboard</span>
<button class="min-btn" onclick="toggleWindow('leaderboardWindow')">_</button>
</div>

<div class="window-body">

<table id="leaderboard">

<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Time</th>
<th>Date</th>
<th>X</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>
</div>

<!-- BASEBALL -->

<div class="window" id="baseballWindow" style="bottom:50px;left:50px;top:auto">

<div class="window-header">
<span>That's Baseball</span>
<button class="min-btn" onclick="toggleWindow('baseballWindow')">_</button>
</div>

<div class="window-body" onclick="openRandomBaseballWiki()" style="cursor:pointer;font-weight:bold;color:#000080">
⚾ Click me!
</div>

</div>

<!-- STATS -->

<div class="window" id="yugStatsWindow">

<div class="window-header">
<span>Yug Stats</span>
<button class="min-btn" onclick="toggleWindow('yugStatsWindow')">_</button>
</div>

<div class="window-body">

<div>Total Yugs: <span id="totalYugs">0</span></div>
<div>Total Time: <span id="totalYugTime">0</span></div>

<img src="https://raw.githubusercontent.com/goatchase/anus100k/main/Yug.jpg" style="max-width:120px;margin-top:10px">

</div>
</div>

<!-- START MENU -->

<div id="startMenu">
<div class="menu-item" onclick="restoreWindow('timerWindow')">Timer</div>
<div class="menu-item" onclick="restoreWindow('leaderboardWindow')">Leaderboard</div>
<div class="menu-item" onclick="restoreWindow('baseballWindow')">That's Baseball</div>
<div class="menu-item" onclick="restoreWindow('yugStatsWindow')">Yug Stats</div>
</div>

<!-- START BAR -->

<div id="startBar">

<div id="startButton">Start</div>

<div id="taskbar"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore,collection,addDoc,query,orderBy,onSnapshot,doc,updateDoc,deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"goatchase-e9502.firebaseapp.com",
projectId:"goatchase-e9502",
storageBucket:"goatchase-e9502.appspot.com",
messagingSenderId:"16998517478",
appId:"1:16998517478:web:8985a2bf70d7df9bccc927"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const leaderboardCol=collection(db,"yugLeaderboard");

const timerText=document.getElementById("timerText");
const timerFill=document.getElementById("timerFill");
const board=document.querySelector("#leaderboard tbody");

let startTime=null;
let interval=null;
let leaderboard=[];

/* TIMER */

window.startTimer=function(){

if(interval)return;

startTime=Date.now();

interval=setInterval(()=>{

const elapsed=(Date.now()-startTime)/1000;

timerText.textContent=elapsed.toFixed(2);

},10);

}

window.stopTimer=async function(){

clearInterval(interval);
interval=null;

const name=document.getElementById("nameInput").value.trim();

if(!name)return alert("Enter name");

const time=parseFloat(timerText.textContent);

const date=new Date().toLocaleDateString();

await addDoc(leaderboardCol,{name,time,date});

resetTimer();

}

window.resetTimer=function(){

clearInterval(interval);

interval=null;

timerText.textContent="0.00";

}

/* FIRESTORE */

function renderLeaderboard(){

board.innerHTML="";

leaderboard.sort((a,b)=>a.time-b.time);

const fastest=leaderboard.length?leaderboard[0].time:1;

leaderboard.forEach((entry,i)=>{

const row=document.createElement("tr");

const percent=(fastest/entry.time)*100;

row.innerHTML=`

<td class="${i===0?'rank1':''}">${i+1}</td>

<td>${entry.name}</td>

<td>

<input class="time-input beerbar"
style="--percent:${percent}%"
type="number"
step="0.01"
value="${entry.time.toFixed(2)}"
onchange="updateTime('${entry.id}',this.value)">

</td>

<td>${entry.date}</td>

<td><button onclick="deleteEntry('${entry.id}')">X</button></td>

`;

board.appendChild(row);

});

}

/* FIRESTORE LISTENER */

const q=query(leaderboardCol,orderBy("time"));

onSnapshot(q,snap=>{

leaderboard=[];

snap.forEach(d=>{

leaderboard.push({id:d.id,...d.data()});

});

renderLeaderboard();

});

/* UPDATE */

window.updateTime=async function(id,value){

await updateDoc(doc(db,"yugLeaderboard",id),{time:parseFloat(value)});

}

window.deleteEntry=async function(id){

await deleteDoc(doc(db,"yugLeaderboard",id));

}

/* START MENU */

const startButton=document.getElementById("startButton");
const startMenu=document.getElementById("startMenu");

startButton.onclick=()=>{

startMenu.style.display=startMenu.style.display==="block"?"none":"block";

};

document.addEventListener("click",e=>{

if(!startMenu.contains(e.target)&&e.target!==startButton){

startMenu.style.display="none";

}

});

/* TASKBAR */

const taskbar=document.getElementById("taskbar");

window.toggleWindow=function(id){

const win=document.getElementById(id);

if(win.style.display==="none"){

win.style.display="block";

document.querySelector(`[data-window='${id}']`)?.remove();

return;

}

win.style.display="none";

const btn=document.createElement("div");

btn.className="task-button";

btn.textContent=win.querySelector(".window-header span").textContent;

btn.dataset.window=id;

btn.onclick=()=>{

win.style.display="block";

btn.remove();

};

taskbar.appendChild(btn);

};

window.restoreWindow=function(id){

const win=document.getElementById(id);

win.style.display="block";

document.querySelector(`[data-window='${id}']`)?.remove();

};

/* DRAG WINDOWS */

function makeDraggable(el){

const header=el.querySelector(".window-header");

let offsetX,offsetY,isDown=false;

header.addEventListener("mousedown",e=>{

isDown=true;

offsetX=e.clientX-el.offsetLeft;

offsetY=e.clientY-el.offsetTop;

});

document.addEventListener("mousemove",e=>{

if(!isDown)return;

el.style.left=e.clientX-offsetX+"px";

el.style.top=e.clientY-offsetY+"px";

});

document.addEventListener("mouseup",()=>isDown=false);

}

makeDraggable(timerWindow);
makeDraggable(leaderboardWindow);
makeDraggable(baseballWindow);
makeDraggable(yugStatsWindow);

/* BASEBALL RANDOM */

window.openRandomBaseballWiki=function(){

window.open("https://en.wikipedia.org/wiki/Baseball","_blank");

}

</script>

</body>
</html>
